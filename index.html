<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>曇時 線上點餐</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap');

*{box-sizing:border-box;}
body{margin:0;background:#241f30;font-family:'Noto Sans TC',sans-serif;}
:root{
  --ink:#241f30; --ink-deep:#191420; --card:#2d2738;
  --parchment:#f3ece1; --parchment-dim:#c7bfae;
  --gold:#caa06b; --gold-dim:#8a6f4d;
  --rose:#c07b8a; --rose-dim:#7a4d57;
  --sage:#8fa688; --sage-dim:#4d5c48;
  --mist:#a79bc4; --line:rgba(243,236,225,0.12);
}
.wrap{
  background:var(--ink); color:var(--parchment); padding:28px 22px 34px;
  border-radius:14px; max-width:640px; margin:0 auto; position:relative;
  overflow:hidden; min-height:100vh;
}
@media (min-width:860px){ .wrap{ max-width:760px; } }
.petal{
  position:absolute; width:10px; height:10px; border-radius:0 60% 0 60%;
  background:var(--rose); opacity:0.18; animation:fall linear infinite;
}
@keyframes fall{from{transform:translateY(-20px) rotate(0deg);} to{transform:translateY(420px) rotate(200deg);}}

.header{
  position:relative; z-index:1; display:flex; justify-content:space-between; align-items:flex-end;
  margin-bottom:22px; padding-bottom:16px; border-bottom:1px solid var(--line);
}
.brand h1{font-family:'Noto Serif TC',serif;font-weight:600;font-size:21px;margin:0 0 2px;letter-spacing:0.02em;}
.brand p{margin:0;font-size:12px;color:var(--parchment-dim);letter-spacing:0.05em;}
.clock{text-align:right;font-size:12px;color:var(--parchment-dim);}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;}
.dot.online{background:var(--sage);}
.dot.offline{background:var(--rose);}

.panel{position:relative;z-index:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:14px;}
.panel-title{font-size:12px;color:var(--mist);letter-spacing:0.06em;margin:0 0 10px;text-transform:uppercase;}
.cat-title{font-family:'Noto Serif TC',serif;font-weight:600;font-size:14px;color:var(--gold);margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line);}
.cat-title:first-child{margin-top:0;}

.item-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(243,236,225,0.06);}
.item-row:last-child{border-bottom:none;}
.item-name{flex:1;font-size:14px;}
.item-note{display:block;font-size:11px;color:var(--parchment-dim);margin-top:2px;}
.item-price{font-size:13px;color:var(--gold-dim);min-width:64px;text-align:right;}
.stepper{display:flex;align-items:center;gap:6px;}
.step-btn{width:26px;height:26px;border-radius:6px;background:var(--ink-deep);border:1px solid var(--line);color:var(--parchment);font-size:14px;cursor:pointer;line-height:1;}
.step-btn:hover{border-color:var(--gold-dim);color:var(--gold);}
.step-qty{width:20px;text-align:center;font-size:14px;}

.addon-row{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--mist);margin-top:4px;margin-left:0;}
.addon-row input{accent-color:var(--gold-dim);}

input[type=text]{
  background:var(--ink-deep);border:1px solid var(--line);color:var(--parchment);
  border-radius:7px;padding:9px 11px;font-size:14px;font-family:inherit;width:100%;
}
input::placeholder{color:var(--parchment-dim);}
input:focus{outline:none;border-color:var(--gold-dim);}
.row{display:flex;gap:8px;flex-wrap:wrap;}

.btn{background:transparent;border:1px solid var(--gold-dim);color:var(--gold);border-radius:7px;padding:9px 16px;font-size:13px;font-family:inherit;cursor:pointer;white-space:nowrap;}
.btn:hover{background:rgba(202,160,107,0.1);}
.btn.primary{background:var(--gold-dim);color:var(--ink-deep);border-color:var(--gold-dim);font-weight:500;width:100%;padding:12px;font-size:14px;}
.btn.primary:hover{background:var(--gold);}
.btn.primary:disabled{opacity:0.4;cursor:not-allowed;}
.btn.ghost{border-color:var(--line);color:var(--parchment-dim);}

.cart-line{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:var(--parchment-dim);}
.cart-line span.name{color:var(--parchment);}
.cart-total{display:flex;justify-content:space-between;font-size:15px;font-weight:600;color:var(--gold);border-top:1px solid var(--line);margin-top:8px;padding-top:10px;}
.empty-cart{font-size:12.5px;color:var(--parchment-dim);}

.configwarn{position:relative;z-index:1;background:#3a2b2b;border:1px solid var(--rose-dim);color:var(--parchment);border-radius:8px;padding:12px 14px;margin-bottom:14px;font-size:13px;line-height:1.6;}
.success-box{position:relative;z-index:1;background:rgba(143,166,136,0.12);border:1px solid var(--sage-dim);border-radius:10px;padding:18px;text-align:center;margin-bottom:14px;}
.success-box .num{font-family:'Noto Serif TC',serif;font-size:30px;color:var(--sage);margin:6px 0;}
</style>
</head>
<body>
<div class="wrap" id="wrap">

  <div class="header">
    <div class="brand">
      <h1>曇時 Cafe l'Éphémère</h1>
      <p>線上點餐</p>
    </div>
    <div class="clock">
      <div><span class="dot offline" id="connDot"></span><span id="connText">連線中...</span></div>
    </div>
  </div>

  <div id="configWarn" class="configwarn" style="display:none;">
    尚未設定 Firebase 連線資訊，請在程式碼中填入 firebaseConfig 後重新上傳。
  </div>

  <div id="successBox" class="success-box" style="display:none;">
    <div style="font-size:12px;color:var(--parchment-dim);letter-spacing:0.06em;">訂單已送出</div>
    <div class="num" id="successNumber"></div>
    <div style="font-size:12.5px;color:var(--parchment-dim);">請向店員出示此編號，餐點準備完成會由店員為您送上</div>
    <button class="btn ghost" id="newOrderBtn" style="margin-top:12px;">再點一份</button>
  </div>

  <div id="orderFlow">
    <div class="panel">
      <p class="panel-title">菜單</p>
      <div id="menuList"></div>
    </div>

    <div class="panel">
      <p class="panel-title">已選品項</p>
      <div id="cartList"><span class="empty-cart">尚未選擇餐點</span></div>
    </div>

    <div class="panel">
      <p class="panel-title">訂購資料</p>
      <div class="row">
        <input type="text" id="custName" placeholder="角色名／稱呼">
      </div>
      <div class="row" style="margin-top:8px;">
        <input type="text" id="custNote" placeholder="備註（座位、指定服務等，選填）">
      </div>
      <p id="orderError" style="font-size:12px;color:var(--rose);margin:10px 0 0;display:none;"></p>
      <button class="btn primary" id="submitOrder" style="margin-top:12px;">送出訂單</button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js"></script>
<script>
(function(){

  var firebaseConfig = {
    apiKey: "AIzaSyAPIpmaLgXp3TVTV7y-yrH63xkMtAuYMSQ",
    authDomain: "lephemere-queue-c38d5.firebaseapp.com",
    databaseURL: "https://lephemere-queue-c38d5-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "lephemere-queue-c38d5",
    storageBucket: "lephemere-queue-c38d5.firebasestorage.app",
    messagingSenderId: "35595928973",
    appId: "1:35595928973:web:36a8a4695fd293061d29c4"
  };

  var isConfigured = firebaseConfig.apiKey.indexOf('貼上') === -1;
  if(!isConfigured){ document.getElementById('configWarn').style.display = 'block'; }

  var MENU = [
    { cat: 'Appetizer 前菜', items: [
      { id:'app1', name:'黑衣森林傘蕈溫沙拉', price:8000 },
      { id:'app2', name:'庫爾蘋果新薯沙拉', price:8000 }
    ]},
    { cat: 'Soup 湯品', items: [
      { id:'soup1', name:'法式焗烤起司洋蔥湯', price:12000 }
    ]},
    { cat: 'Main Course 主食', items: [
      { id:'main1', name:'巨匠特製紅醬蛋包飯', price:18000, addon:{ id:'hiddenMagic', label:'加購隱藏魔法（店員到桌服務）', price:5000 } },
      { id:'main2', name:'黑松露野菇燉飯', price:18000 }
    ]},
    { cat: 'Drinks 飲品', items: [
      { id:'drink1', name:'三倍絲滑鮮奶油咖啡', price:10000 },
      { id:'drink2', name:'絲絨醇厚熱巧克力', price:10000 },
      { id:'drink3', name:'伊修加爾德皇家奶茶', price:10000 }
    ]},
    { cat: 'Dessert 甜品', items: [
      { id:'dessert1', name:'莊園黑巧奶油蛋糕', price:10000 },
      { id:'dessert2', name:'現煎黃金法式吐司', price:10000 },
      { id:'dessert3', name:'秋實手工柿子布丁', price:10000 }
    ]},
    { cat: 'Set 無菜單料理', items: [
      { id:'set1', name:'主廚精選五道套餐（店長隨機出餐）', price:40000, note:'共5道菜，內容由店長現場決定' }
    ]}
  ];

  var cart = {}; // id -> {name, price, qty, addon:{label,price}|null}
  var db, ordersRef, nextOrderNumberRef, webhookRef;
  var webhookUrl = '';

  function petals(){
    var wrap = document.getElementById('wrap');
    for(var i=0;i<6;i++){
      var p = document.createElement('div');
      p.className='petal';
      p.style.left=(Math.random()*100)+'%';
      p.style.animationDuration=(10+Math.random()*8)+'s';
      p.style.animationDelay=(Math.random()*10)+'s';
      wrap.appendChild(p);
    }
  }
  petals();

  function tickClock(){
    var d=new Date();
    document.getElementById('connText').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  }
  tickClock();
  setInterval(tickClock,15000);

  function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
  function fmtGil(n){ return n.toLocaleString('en-US') + ' Gil'; }

  if(isConfigured){
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
    ordersRef = db.ref('lephemere/orders');
    nextOrderNumberRef = db.ref('lephemere/nextOrderNumber');
    webhookRef = db.ref('lephemere/webhookUrl');

    db.ref('.info/connected').on('value', function(snap){
      document.getElementById('connDot').className = snap.val()===true ? 'dot online' : 'dot offline';
    });

    webhookRef.on('value', function(snap){ webhookUrl = snap.val() || ''; });
  }

  // ---------- menu rendering ----------
  function findItem(id){
    for(var c=0;c<MENU.length;c++){
      for(var i=0;i<MENU[c].items.length;i++){
        if(MENU[c].items[i].id === id) return MENU[c].items[i];
      }
    }
    return null;
  }

  function renderMenu(){
    var el = document.getElementById('menuList');
    var html = '';
    MENU.forEach(function(group){
      html += '<div class="cat-title">'+escapeHtml(group.cat)+'</div>';
      group.items.forEach(function(item){
        var qty = cart[item.id] ? cart[item.id].qty : 0;
        html += '<div class="item-row">'
          + '<div class="item-name">'+escapeHtml(item.name)
          + (item.note ? '<span class="item-note">'+escapeHtml(item.note)+'</span>' : '')
          + (item.addon ? '<div class="addon-row"><input type="checkbox" id="addon-'+item.id+'" '+(cart[item.id]&&cart[item.id].addon?'checked':'')+'><label for="addon-'+item.id+'">'+escapeHtml(item.addon.label)+' ＋'+fmtGil(item.addon.price)+'</label></div>' : '')
          + '</div>'
          + '<div class="item-price">'+fmtGil(item.price)+'</div>'
          + '<div class="stepper">'
          + '<button class="step-btn" data-dec="'+item.id+'">－</button>'
          + '<span class="step-qty" id="qty-'+item.id+'">'+qty+'</span>'
          + '<button class="step-btn" data-inc="'+item.id+'">＋</button>'
          + '</div>'
          + '</div>';
      });
    });
    el.innerHTML = html;

    el.querySelectorAll('[data-inc]').forEach(function(btn){
      btn.addEventListener('click', function(){ changeQty(btn.getAttribute('data-inc'), 1); });
    });
    el.querySelectorAll('[data-dec]').forEach(function(btn){
      btn.addEventListener('click', function(){ changeQty(btn.getAttribute('data-dec'), -1); });
    });
    el.querySelectorAll('[id^="addon-"]').forEach(function(cb){
      cb.addEventListener('change', function(){
        var itemId = cb.id.replace('addon-','');
        if(!cart[itemId]) return;
        var item = findItem(itemId);
        cart[itemId].addon = cb.checked ? { label:item.addon.label, price:item.addon.price } : null;
        renderCart();
      });
    });
  }

  function changeQty(id, delta){
    var item = findItem(id);
    if(!item) return;
    var current = cart[id] ? cart[id].qty : 0;
    var next = Math.max(0, current + delta);
    if(next === 0){
      delete cart[id];
    } else {
      if(!cart[id]) cart[id] = { name:item.name, price:item.price, qty:0, addon:null };
      cart[id].qty = next;
    }
    var qtyEl = document.getElementById('qty-'+id);
    if(qtyEl) qtyEl.textContent = next;
    renderCart();
  }

  function cartTotal(){
    var total = 0;
    Object.keys(cart).forEach(function(id){
      var line = cart[id];
      total += line.price * line.qty;
      if(line.addon) total += line.addon.price;
    });
    return total;
  }

  function renderCart(){
    var el = document.getElementById('cartList');
    var ids = Object.keys(cart);
    if(ids.length === 0){
      el.innerHTML = '<span class="empty-cart">尚未選擇餐點</span>';
      return;
    }
    var html = '';
    ids.forEach(function(id){
      var line = cart[id];
      html += '<div class="cart-line"><span class="name">'+escapeHtml(line.name)+' × '+line.qty+'</span><span>'+fmtGil(line.price*line.qty)+'</span></div>';
      if(line.addon){
        html += '<div class="cart-line"><span>　'+escapeHtml(line.addon.label)+'</span><span>'+fmtGil(line.addon.price)+'</span></div>';
      }
    });
    html += '<div class="cart-total"><span>總計</span><span>'+fmtGil(cartTotal())+'</span></div>';
    el.innerHTML = html;
  }

  renderMenu();
  renderCart();

  // ---------- submit ----------
  function sendDiscordNotification(text){
    if(!webhookUrl) return;
    fetch(webhookUrl, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({content: text})
    }).catch(function(){});
  }

  document.getElementById('submitOrder').addEventListener('click', function(){
    if(!isConfigured) return;
    var errEl = document.getElementById('orderError');
    var name = document.getElementById('custName').value.trim();
    var note = document.getElementById('custNote').value.trim();
    var ids = Object.keys(cart);

    if(!name){
      errEl.textContent = '請填寫角色名／稱呼';
      errEl.style.display = 'block';
      return;
    }
    if(ids.length === 0){
      errEl.textContent = '請至少選擇一項餐點';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';

    var submitBtn = document.getElementById('submitOrder');
    submitBtn.disabled = true;
    submitBtn.textContent = '送出中...';

    var items = ids.map(function(id){
      var line = cart[id];
      return { id:id, name:line.name, price:line.price, qty:line.qty, addon: line.addon };
    });
    var total = cartTotal();

    nextOrderNumberRef.transaction(function(current){
      return (current || 0) + 1;
    }).then(function(result){
      var orderNumber = result.snapshot.val();
      var orderId = ordersRef.push().key;
      ordersRef.child(orderId).set({
        orderNumber: orderNumber,
        name: name,
        note: note,
        items: items,
        total: total,
        status: 'pending',
        createdAt: Date.now()
      }).then(function(){
        var lines = items.map(function(it){
          var extra = it.addon ? '（＋'+it.addon.label+'）' : '';
          return '・'+it.name+' × '+it.qty+extra;
        }).join('\n');
        sendDiscordNotification('新的點餐訂單 #'+orderNumber+'\n'+name+(note?'（'+note+'）':'')+'\n'+lines+'\n總計：'+fmtGil(total));

        document.getElementById('successNumber').textContent = '#'+orderNumber;
        document.getElementById('orderFlow').style.display = 'none';
        document.getElementById('successBox').style.display = 'block';

        cart = {};
        document.getElementById('custName').value = '';
        document.getElementById('custNote').value = '';
        renderMenu();
        renderCart();
        submitBtn.disabled = false;
        submitBtn.textContent = '送出訂單';
      });
    }).catch(function(){
      errEl.textContent = '送出失敗，請稍後再試一次';
      errEl.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = '送出訂單';
    });
  });

  document.getElementById('newOrderBtn').addEventListener('click', function(){
    document.getElementById('successBox').style.display = 'none';
    document.getElementById('orderFlow').style.display = 'block';
  });

})();
</script>

</body>
</html>
